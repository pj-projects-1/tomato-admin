<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#67C23A"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#303133">
    配送规划流程
  </text>

  <!-- Step 1: Set Locations -->
  <g transform="translate(50, 45)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#303133">📍 设置出发地</text>
    <text x="70" y="48" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#909399">仓库/农场</text>
    <text x="70" y="62" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#909399">可选择环形路线</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="195" y1="80" x2="235" y2="80" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: Select Orders -->
  <g transform="translate(240, 45)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#303133">📋 选择配送单</text>
    <text x="70" y="48" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#909399">勾选待配送订单</text>
    <text x="70" y="62" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#F56C6C">需有坐标标记</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="385" y1="80" x2="425" y2="80" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 3: Create Task -->
  <g transform="translate(430, 45)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#303133">➕ 创建任务</text>
    <text x="70" y="48" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#909399">命名任务</text>
    <text x="70" y="62" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#909399">规划路线</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="575" y1="80" x2="615" y2="80" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen2)"/>

  <!-- Step 4: Navigate -->
  <g transform="translate(620, 45)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#67C23A" fill-opacity="0.2" stroke="#67C23A" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#303133">🗺️ 高德导航</text>
    <text x="70" y="48" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#909399">一键导航</text>
    <text x="70" y="62" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#67C23A">途经点自动导入</text>
  </g>

  <!-- Map illustration -->
  <g transform="translate(180, 140)">
    <rect x="0" y="0" width="440" height="70" rx="8" fill="#F5F7FA" stroke="#DCDFE6" stroke-width="1"/>
    <text x="220" y="20" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#909399">路线示例</text>

    <!-- Route dots -->
    <circle cx="60" cy="45" r="8" fill="#67C23A"/>
    <text x="60" y="48" text-anchor="middle" font-family="Arial" font-size="10" fill="white">起</text>

    <circle cx="150" cy="35" r="6" fill="#409EFF"/>
    <text x="150" y="38" text-anchor="middle" font-family="Arial" font-size="8" fill="white">1</text>

    <circle cx="230" cy="50" r="6" fill="#409EFF"/>
    <text x="230" y="53" text-anchor="middle" font-family="Arial" font-size="8" fill="white">2</text>

    <circle cx="310" cy="40" r="6" fill="#409EFF"/>
    <text x="310" y="43" text-anchor="middle" font-family="Arial" font-size="8" fill="white">3</text>

    <circle cx="380" cy="50" r="8" fill="#F56C6C"/>
    <text x="380" y="53" text-anchor="middle" font-family="Arial" font-size="10" fill="white">终</text>

    <!-- Route line -->
    <path d="M 70 45 Q 100 30 150 35 Q 190 40 230 50 Q 270 55 310 40 Q 340 35 370 50"
          stroke="#409EFF" stroke-width="2" fill="none" stroke-dasharray="5"/>
  </g>
</svg>
