<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="四月红番天 - 有机番茄销售管理系统" />
    <title>四月红番天 - 有机番茄销售管理</title>
    <style>
      /* Initial loading spinner - shown while app loads */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f7fa;
        z-index: 9999;
      }
      #app-loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e4e7ed;
        border-top-color: #409eff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loading .text {
        margin-top: 16px;
        color: #606266;
        font-size: 14px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* Hide loading when Vue app is ready */
      #app:not(:empty) + #app-loading {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="app-loading">
      <div class="spinner"></div>
      <div class="text">加载中...</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
